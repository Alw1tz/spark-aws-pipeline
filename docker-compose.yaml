# Stack: Airflow 3.2.2 (SequentialExecutor + SQLite) + Spark 4.0.3 (standalone cluster) + AWS S3
#
# UIs:
#   Airflow      → http://localhost:8080  (airflow / airflow)
#   Spark Master → http://localhost:8090
#   Spark Worker → http://localhost:8091 / http://localhost:8092
#
# Setup:
#   docker compose up airflow-init
#   docker compose up -d
#
# Spark quick test (bypassing Airflow):
#   docker compose exec spark-master /opt/spark/bin/spark-submit \
#     --master spark://spark-master:7077 /opt/spark/apps/wordcount.py
---
x-airflow-common:
  &airflow-common
  build: ./airflow
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/config/airflow.db
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ''
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/config:/opt/airflow/config
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark/apps:/opt/airflow/spark_apps
    - ./airflow/.ivy2:/opt/airflow/.ivy2
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - spark-aws-sandbox

services:

  # ── Airflow ──────────────────────────────────────────────────────────────────

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config}
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
        /entrypoint airflow db migrate
        /entrypoint airflow users create \
          --username ${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
          --password ${_AIRFLOW_WWW_USER_PASSWORD:-airflow} \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com
        /entrypoint airflow connections delete aws_default 2>/dev/null || true
        /entrypoint airflow connections add aws_default \
          --conn-type aws \
          --conn-login "$${AWS_ACCESS_KEY_ID}" \
          --conn-password "$${AWS_SECRET_ACCESS_KEY}" \
          --conn-extra "{\"region_name\": \"$${AWS_DEFAULT_REGION}\"}"
        /entrypoint airflow connections delete spark_default 2>/dev/null || true
        /entrypoint airflow connections add spark_default \
          --conn-type spark \
          --conn-host spark://spark-master \
          --conn-port 7077
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
    user: "0:0"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Spark ─────────────────────────────────────────────────────────────────────

  spark-master:
    image: apache/spark:4.0.3-python3
    container_name: spark-master
    user: root
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "8090:8080"
      - "7077:7077"
    volumes:
      - ./spark/apps:/opt/spark/apps
      - ./spark/data:/opt/spark/data
    networks:
      - spark-aws-sandbox
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  spark-worker-1:
    image: apache/spark:4.0.3-python3
    container_name: spark-worker-1
    user: root
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2g
      - --webui-port
      - "8081"
    depends_on:
      - spark-master
    ports:
      - "8091:8081"
    volumes:
      - ./spark/apps:/opt/spark/apps
      - ./spark/data:/opt/spark/data
    networks:
      - spark-aws-sandbox
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 1G

  spark-worker-2:
    image: apache/spark:4.0.3-python3
    container_name: spark-worker-2
    user: root
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2g
      - --webui-port
      - "8081"
    depends_on:
      - spark-master
    ports:
      - "8092:8081"
    volumes:
      - ./spark/apps:/opt/spark/apps
      - ./spark/data:/opt/spark/data
    networks:
      - spark-aws-sandbox
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 1G

networks:
  spark-aws-sandbox:
    driver: bridge
